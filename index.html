<!doctype html>
<html lang="en" class="light" style="color-scheme: light;">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echelon Property Group</title>
    <meta name="google-site-verification" content="dhXAgewx3oiXuLhNF6giXHxaz8pFcyt_MogbeQKtTfA" />
    <meta name="author" content="Echelon Property Group" />

    <!-- DNS prefetch & preconnect for third-party domains -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.clarity.ms" />
    <link rel="dns-prefetch" href="https://em.realscout.com" />
    <link rel="dns-prefetch" href="https://embedsocial.com" />
    <link rel="dns-prefetch" href="https://www.redditstatic.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://em.realscout.com" crossorigin />

    <!-- Self-hosted fonts (no external requests to fonts.googleapis.com / fonts.gstatic.com) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/raleway-faccb37f.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/playfair-48d1e9cd.woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Preload hero poster with high priority -->
    <link rel="preload" as="image" href="/images/hero-poster.jpg" fetchpriority="high" />

    <!-- Critical inline CSS for above-the-fold rendering -->
    <style>
      body{margin:0;font-family:'Raleway',sans-serif;background:#faf8f5;color:#191d2b;-webkit-font-smoothing:antialiased}
      .font-display{font-family:'Playfair Display',serif}
      #root{min-height:100vh}
    </style>

    <!-- RealScout widget styles (no script loaded until idle) -->
    <style>
      realscout-advanced-search {
        --rs-as-button-text-color: #ffffff;
        --rs-as-background-color: #f8f6f1;
        --rs-as-button-color: #0c0f24;
        --rs-as-button-hover-color: #baa26a;
        --rs-as-button-hover-text-color: #ffffff;
        --rs-as-widget-width: 100% !important;
        --rs-as-button-border-radius: 4px;
        width: 100%;
      }

      realscout-advanced-search::part(search-button),
      realscout-advanced-search button[type="submit"],
      realscout-advanced-search button {
        min-height: 56px !important;
        padding-top: 16px !important;
        padding-bottom: 16px !important;
      }

      realscout-your-listings {
        --rs-listing-divider-color: #0c0f24;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Defer analytics & third-party scripts until after page is interactive -->
    <script>
      // Load third-party scripts after the page is fully interactive
      function loadDeferredScripts() {
        // Google Analytics
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-Y84Q0NX0NE';
        document.head.appendChild(ga);
        ga.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-Y84Q0NX0NE');
          gtag('config', 'AW-17598090760');
        };

        // Microsoft Clarity
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vwdl4xpdfi");

        // RealScout widget script
        var rs = document.createElement('script');
        rs.type = 'module';
        rs.src = 'https://em.realscout.com/widgets/realscout-web-components.umd.js';
        document.head.appendChild(rs);

        // Reddit Pixel
        !function(w,d){if(!w.rdt){var p=w.rdt=function(){p.sendEvent?p.sendEvent.apply(p,arguments):p.callQueue.push(arguments)};p.callQueue=[];var t=d.createElement("script");t.src="https://www.redditstatic.com/ads/pixel.js?pixel_id=a2_ipm5ghc593ui";t.async=1;var s=d.getElementsByTagName("script")[0];s.parentNode.insertBefore(t,s)}}(window,document);
        rdt('init','a2_ipm5ghc593ui');
        rdt('track','PageVisit');
      }

      // Defer all third-party scripts until well after page is interactive
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          setTimeout(loadDeferredScripts, 2000);
        }, { timeout: 6000 });
      } else {
        window.addEventListener('load', function() {
          setTimeout(loadDeferredScripts, 3500);
        });
      }
    </script>
  </body>
</html>
