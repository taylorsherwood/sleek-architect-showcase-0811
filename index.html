    <!-- Critical inline CSS for above-the-fold rendering (includes critical @font-face) -->
    <style>
      /* Critical @font-face */
      @font-face{font-family:'Raleway';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/raleway-faccb37f.woff2) format('woff2')}
      @font-face{font-family:'Playfair Display';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/playfair-48d1e9cd.woff2) format('woff2')}
      @font-face{font-family:'Cinzel';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/cinzel-latin.woff2) format('woff2')}
      @font-face{font-family:'Jost';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/jost-latin.woff2) format('woff2')}
      /* CSS custom properties needed for prerendered hero paint */
      :root{--primary:233 47% 9%;--primary-foreground:40 25% 95%;--background:40 25% 95%;--foreground:233 47% 9%;--secondary:40 25% 95%;--secondary-foreground:233 47% 9%;--warm-cream:40 25% 95%;--gold:41 34% 57%;--muted-foreground:25 4% 42%;--border:30 18% 86%;--ring:233 47% 9%;--radius:0.25rem;--black-soft:233 52% 7%;color-scheme:light only}
      /* Critical base + hero layout (prevents FOUC when main CSS loads async) */
      *,*::before,*::after{box-sizing:border-box}
      html,body{overflow-x:hidden;width:100%;margin:0}
      body{font-family:'Jost',sans-serif;font-weight:400;font-size:16px;background:#f6f4f0;color:#0C0F24;-webkit-font-smoothing:antialiased}
      img{max-width:100%;height:auto}
      .font-display{font-family:'Cinzel',serif}
      h1,h2,h3{font-family:'Cinzel',serif;font-weight:500}
      #root{min-height:100vh}
      /* Hero section critical layout */
      .relative{position:relative}.absolute{position:absolute}.overflow-hidden{overflow:hidden}
      .flex{display:flex}.items-center{align-items:center}.flex-row{flex-direction:row}
      .flex-col{flex-direction:column}.justify-end{justify-content:flex-end}
      .h-screen{height:100vh}.min-h-screen{min-height:100vh}
      .w-full{width:100%}.h-full{height:100%}
      .inset-0{inset:0}.object-cover{object-fit:cover}
      .pointer-events-none{pointer-events:none}.select-none{user-select:none}
      .container{width:100%;margin-left:auto;margin-right:auto;padding-left:1rem;padding-right:1rem}
      @media(min-width:640px){.container{max-width:640px}}
      @media(min-width:768px){.container{max-width:768px}}
      @media(min-width:1024px){.container{max-width:1024px}}
      @media(min-width:1280px){.container{max-width:1280px}}
      .mx-auto{margin-left:auto;margin-right:auto}
      .px-6{padding-left:1.5rem;padding-right:1.5rem}
      .z-10{z-index:10}.z-20{z-index:20}
      .bg-primary{background-color:hsl(233 47% 9%)}.bg-background{background-color:hsl(40 25% 95%)}.bg-secondary{background-color:hsl(40 25% 95%)}
      .text-foreground{color:hsl(233 47% 9%)}
      .text-warm-cream{color:hsl(40 25% 95%)}
      .hero-bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:52% 18%}
      .transition-opacity{transition-property:opacity;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:150ms}
      .duration-700{transition-duration:700ms}
      .opacity-0{opacity:0}.opacity-100{opacity:1}
      .inline-flex{display:inline-flex}.inline-block{display:inline-block}
      .text-center{text-align:center}.whitespace-nowrap{white-space:nowrap}
      .gap-4{gap:1rem}
      .hidden{display:none}
      @media(min-width:640px){.sm\:flex-row{flex-direction:row}}
      @media(min-width:768px){.md\:hidden{display:none}}
      @media(min-width:1024px){.lg\:block{display:block}}

    <!-- Load RealScout widget script only when a widget is near the viewport -->
    <script>
      (function(){
        var loaded=false;
        function loadRealScout(){
          if(loaded)return;loaded=true;
          var s=document.createElement('script');s.type='module';
          s.src='https://em.realscout.com/widgets/realscout-web-components.umd.js';
          document.body.appendChild(s);
        }
        function observe(){
          var els=document.querySelectorAll('realscout-simple-search,realscout-advanced-search,realscout-your-listings');
          if(!els.length){setTimeout(observe,2000);return;}
          if('IntersectionObserver' in window){
            var io=new IntersectionObserver(function(entries){
              for(var i=0;i<entries.length;i++){if(entries[i].isIntersecting){loadRealScout();io.disconnect();return;}}
            },{rootMargin:'600px'});
            els.forEach(function(el){io.observe(el);});
          }else{loadRealScout();}
        }
        if(document.readyState==='complete')observe();
        else window.addEventListener('load',observe,{once:true});
      })();
    </script>

    <!-- Defer analytics & third-party scripts until after page is interactive -->
    <script>
      function loadDeferredScripts() {
        // Google Analytics
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-Y84Q0NX0NE';
        document.head.appendChild(ga);
        ga.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-Y84Q0NX0NE');
          gtag('config', 'AW-17598090760');
        };

        // Microsoft Clarity
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vwdl4xpdfi");

        // Reddit Pixel
        !function(w,d){if(!w.rdt){var p=w.rdt=function(){p.sendEvent?p.sendEvent.apply(p,arguments):p.callQueue.push(arguments)};p.callQueue=[];var t=d.createElement("script");t.src="https://www.redditstatic.com/ads/pixel.js?pixel_id=a2_ipm5ghc593ui";t.async=1;var s=d.getElementsByTagName("script")[0];s.parentNode.insertBefore(t,s)}}(window,document);
        rdt('init','a2_ipm5ghc593ui');
        rdt('track','PageVisit');
      }

      var deferredScriptsLoaded = false;
      function startDeferredScripts() {
        if (deferredScriptsLoaded) return;
        deferredScriptsLoaded = true;
        loadDeferredScripts();
      }

      function scheduleDeferredScripts() {
        var onFirstIntent = function() {
          setTimeout(startDeferredScripts, 1200);
        };

        window.addEventListener('pointerdown', onFirstIntent, { once: true, passive: true });
        window.addEventListener('keydown', onFirstIntent, { once: true });

        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() {
            setTimeout(startDeferredScripts, 15000);
          }, { timeout: 15000 });
        } else {
          setTimeout(startDeferredScripts, 12000);
        }
      }

      if (document.readyState === 'complete') {
        scheduleDeferredScripts();
      } else {
        window.addEventListener('load', scheduleDeferredScripts, { once: true });
      }
    </script>
