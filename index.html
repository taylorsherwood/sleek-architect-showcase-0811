    <!-- Load RealScout widget script after page is interactive -->
    <script>
      function loadRealScout(){var s=document.createElement('script');s.type='module';s.src='https://em.realscout.com/widgets/realscout-web-components.umd.js';document.body.appendChild(s);}
      if('requestIdleCallback' in window){requestIdleCallback(loadRealScout,{timeout:5000});}else{window.addEventListener('load',function(){setTimeout(loadRealScout,1500);});}
    </script>

    <!-- Defer analytics & third-party scripts until after page is interactive -->
    <script>
      function loadDeferredScripts() {
        // Google Analytics
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-Y84Q0NX0NE';
        document.head.appendChild(ga);
        ga.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-Y84Q0NX0NE');
          gtag('config', 'AW-17598090760');
        };

        // Microsoft Clarity
        (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vwdl4xpdfi");

        // Reddit Pixel
        !function(w,d){if(!w.rdt){var p=w.rdt=function(){p.sendEvent?p.sendEvent.apply(p,arguments):p.callQueue.push(arguments)};p.callQueue=[];var t=d.createElement("script");t.src="https://www.redditstatic.com/ads/pixel.js?pixel_id=a2_ipm5ghc593ui";t.async=1;var s=d.getElementsByTagName("script")[0];s.parentNode.insertBefore(t,s)}}(window,document);
        rdt('init','a2_ipm5ghc593ui');
        rdt('track','PageVisit');
      }

      var deferredScriptsLoaded = false;
      function startDeferredScripts() {
        if (deferredScriptsLoaded) return;
        deferredScriptsLoaded = true;
        loadDeferredScripts();
      }

      function scheduleDeferredScripts() {
        var onFirstIntent = function() {
          setTimeout(startDeferredScripts, 1200);
        };

        window.addEventListener('pointerdown', onFirstIntent, { once: true, passive: true });
        window.addEventListener('keydown', onFirstIntent, { once: true });

        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() {
            setTimeout(startDeferredScripts, 9000);
          }, { timeout: 15000 });
        } else {
          setTimeout(startDeferredScripts, 12000);
        }
      }

      if (document.readyState === 'complete') {
        scheduleDeferredScripts();
      } else {
        window.addEventListener('load', scheduleDeferredScripts, { once: true });
      }
    </script>
